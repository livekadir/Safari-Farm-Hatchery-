<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safari Farm | Premium Chicks Hatchery</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gold: { 300: '#fde047', 400: '#facc15', 500: '#eab308', 600: '#ca8a04', 700: '#a16207' },
                        royal: { light: '#f8fafc', dark: '#0a0a0a', darker: '#050505' }
                    },
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    animation: { 'float': 'float 5s ease-in-out infinite' },
                    keyframes: { float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-12px)' } } }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #ca8a04; border-radius: 10px; }
        .glass-dark { background: rgba(10, 10, 10, 0.75); backdrop-filter: blur(25px); border: 1px solid rgba(250, 204, 21, 0.15); }
        .glass-light { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(0, 0, 0, 0.05); }
        .gold-gradient { background: linear-gradient(135deg, #facc15, #a16207); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .reveal { opacity: 0; transform: translateY(40px); transition: all 0.9s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        
        /* Chatbot Custom Design */
        #aiChatBox {
            position: fixed; bottom: 90px; left: 20px;
            width: 320px; height: 450px; 
            background: white; border-radius: 20px; 
            display: none; flex-direction: column; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            z-index: 1000; overflow: hidden; border: 1px solid #ddd;
        }
        .dark #aiChatBox { background: #111; border-color: #333; color: white; }
        .chat-header { background: #000; color: #facc15; padding: 15px; font-weight: 800; text-align: center; }
        .chat-body { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #f9f9f9; }
        .dark .chat-body { background: #080808; }
        .msg { padding: 10px 14px; border-radius: 15px; font-size: 14px; max-width: 85%; line-height: 1.4; }
        .msg.user { background: #eab308; color: black; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.ai { background: #eee; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        .dark .msg.ai { background: #222; color: #eee; }
        .chat-footer { padding: 10px; display: flex; gap: 5px; border-top: 1px solid #ddd; background: white; }
        .dark .chat-footer { background: #111; border-color: #333; }
        .chat-footer input { flex: 1; padding: 10px; border: none; outline: none; background: transparent; color: inherit; }
    </style>
</head>
<body class="bg-royal-light text-gray-900 dark:bg-royal-darker dark:text-gray-100">

    <nav class="fixed w-full z-50 pt-5 px-4 md:px-8">
        <div class="max-w-7xl mx-auto px-6 py-3 flex justify-between items-center glass-light dark:glass-dark rounded-full shadow-lg">
            <div class="flex items-center gap-3">
                <img src="logo.png" class="w-10 h-10 rounded-full border-2 border-gold-500">
                <h1 class="text-xl font-bold dark:text-gold-500">SAFARI FARM</h1>
            </div>
            <div class="hidden md:flex gap-6 font-bold text-xs uppercase">
                <a href="#home">Home</a><a href="#chicks">Chicks</a><a href="#about">About</a>
            </div>
            <button onclick="toggleTheme()" class="w-8 h-8 rounded-full bg-gray-200 dark:bg-gray-800"><i class="fas fa-moon dark:text-gold-400"></i></button>
        </div>
    </nav>

    <section id="home" class="min-h-screen flex flex-col items-center justify-center text-center px-6 pt-20">
        <h1 class="text-5xl md:text-8xl font-black mb-4">Safari <span class="gold-gradient">Hatchery</span></h1>
        <p class="max-w-2xl text-gray-600 dark:text-gray-400 text-lg">Premium Vaccinated Quails, Chicks and Smart Incubators.</p>
        <div class="mt-8 flex gap-4">
            <a href="https://wa.me/917063482623" class="bg-gold-500 text-black px-8 py-3 rounded-full font-bold shadow-xl">WhatsApp Booking</a>
        </div>
    </section>

    <div id="aiChatBox">
        <div class="chat-header">SAFARI FARM AI 🐥</div>
        <div class="chat-body" id="chatBody">
            <div class="msg ai">Nomoshkar! 🙏 Main Safari Farm ka AI Assistant hoon. Main aapki kya madad kar sakta hoon?</div>
        </div>
        <div class="chat-footer">
            <input type="text" id="userInput" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()" class="bg-gold-500 text-black px-4 py-2 rounded-xl font-bold"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div class="fixed bottom-6 left-6 z-50">
        <button onclick="toggleChat()" class="w-16 h-16 bg-black dark:bg-gold-500 text-gold-500 dark:text-black rounded-full shadow-2xl flex items-center justify-center text-3xl hover:scale-110 transition">
            <i class="fas fa-robot"></i>
        </button>
    </div>

    <a href="https://wa.me/917063482623" target="_blank" class="fixed bottom-6 right-6 w-16 h-16 bg-[#25D366] text-white rounded-full shadow-2xl flex items-center justify-center text-4xl hover:scale-110 transition z-50">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        // Theme Logic
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
        }

        // --- AI Chat Logic ---
        function toggleChat() {
            const chat = document.getElementById('aiChatBox');
            chat.style.display = (chat.style.display === 'flex') ? 'none' : 'flex';
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            const chatBody = document.getElementById('chatBody');
            
            // Add User Message
            chatBody.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = '';
            chatBody.scrollTop = chatBody.scrollHeight;

            // Add Loading State
            const loadingId = "load-" + Date.now();
            chatBody.innerHTML += `<div class="msg ai" id="${loadingId}">Safari AI soch raha hai...</div>`;
            chatBody.scrollTop = chatBody.scrollHeight;

            try {
                // Cloudflare Backend URL
                const workerUrl = "https://broken-wood-dd3csafari-ai-bot.rifatsahin000.workers.dev"; 
                
                const response = await fetch(workerUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text }) 
                });

                const data = await response.json();
                
                // Show AI Jawab
                document.getElementById(loadingId).innerText = data.reply;
            } catch (error) {
                document.getElementById(loadingId).innerText = "Maaf kijiyega, server busy hai. Kripya WhatsApp par sampark karein.";
            }
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        // Scroll Reveal
        function reveal() {
            const reveals = document.querySelectorAll(".reveal");
            reveals.forEach(r => {
                if (r.getBoundingClientRect().top < window.innerHeight - 100) r.classList.add("active");
            });
        }
        window.addEventListener("scroll", reveal);
    </script>
</body>
</html>
